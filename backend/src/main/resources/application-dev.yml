spring:
  datasource:
    url: jdbc:mysql://localhost:3306/horse_racing_db?useSSL=false&serverTimezone=UTC&allowPublicKeyRetrieval=true
    username: root
    password: root123
    driver-class-name: com.mysql.cj.jdbc.Driver
  jpa:
    hibernate:
      ddl-auto: update
    show-sql: true
    properties:
      hibernate:
        format_sql: true
        dialect: org.hibernate.dialect.MySQLDialect

app:
  jwt:
    secret: mySecretKeyForJWTTokenGenerationThatIsLongEnoughForHS512Algorithm123456789
    expiration: 3600000
    refresh-expiration: 86400000

springdoc:
  api-docs:
    path: /v3/api-docs
  swagger-ui:
    path: /swagger-ui.html
    enabled: true

logging:
  level:
    com.horseracing: DEBUG
    org.springframework.security: DEBUG
